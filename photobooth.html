<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>네컷사진 부스</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--ink:#0f0d0b;--cream:#faf7f2;--sand:#e8e0d4;--warm:#c8a882;--accent:#d4402a;--ok:#2a7a4a;--r:10px;--shadow:0 2px 24px rgba(0,0,0,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
header{display:flex;align-items:center;gap:16px;border-bottom:1.5px solid var(--ink);padding-bottom:12px;margin-bottom:20px}
.logo{font-family:'DM Serif Display',serif;font-size:clamp(20px,4vw,30px);letter-spacing:-.02em}
.logo em{font-style:italic;color:var(--accent)}
.logo-sub{font-size:10px;color:#999;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
header .badge{margin-left:auto;background:var(--ink);color:var(--cream);font-size:9px;letter-spacing:.1em;padding:4px 10px;border-radius:20px;white-space:nowrap}
.steps{display:flex;gap:0;border:1.5px solid var(--ink);border-radius:30px;overflow:hidden;width:fit-content;margin-bottom:20px}
.sp{padding:5px 14px;font-size:11px;font-weight:500;color:#aaa;transition:all .2s;border-right:1.5px solid var(--ink);white-space:nowrap}
.sp:last-child{border-right:none}
.sp.active{background:var(--ink);color:var(--cream)}
.sp.done{color:var(--warm)}
.grid{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.col-cam{flex:1;min-width:280px;max-width:500px}
.col-right{flex-shrink:0;display:flex;flex-direction:column;gap:14px;align-items:center}
.vf-wrap{position:relative;background:#111;border-radius:var(--r);overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow)}
#video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
#camStatus{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,.78);color:#fff;font-size:12px;text-align:center;padding:20px;line-height:1.7}
#camStatus.hidden{display:none}
#camStatus .cs-icon{font-size:32px}
#camStatus .cs-title{font-size:14px;font-weight:700}
.cs-retry{margin-top:4px;padding:7px 18px;border-radius:20px;background:#fff;color:var(--ink);border:none;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;cursor:pointer}
.vf-hud{position:absolute;inset:0;pointer-events:none;padding:10px;display:flex;flex-direction:column;justify-content:space-between}
.hud-top{display:flex;justify-content:space-between}
.pill{background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;backdrop-filter:blur(6px)}
.pill-rec{display:inline-flex;align-items:center;gap:4px;color:#ff4d4d}
.pill-rec::before{content:'';width:6px;height:6px;border-radius:50%;background:#ff3b30;animation:blink 1s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.corners{position:absolute;inset:0;pointer-events:none}
.c{position:absolute;width:14px;height:14px;border-color:rgba(255,255,255,.65);border-style:solid}
.c.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.c.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.c.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.c.br{bottom:10px;right:10px;border-width:0 2px 2px 0}
#cdOvl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);font-family:'DM Serif Display',serif;font-size:110px;color:#fff;opacity:0;pointer-events:none;transition:opacity .12s}
#cdOvl.show{opacity:1}
#flashEl{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .05s}
#flashEl.on{opacity:1}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0 7px}
.fb{padding:4px 11px;border-radius:20px;border:1.5px solid var(--sand);background:#fff;font-size:10px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;color:#777;transition:all .15s}
.fb.on{background:var(--ink);border-color:var(--ink);color:#fff}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:30px;border:1.5px solid var(--ink);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink);transition:all .18s;white-space:nowrap}
.btn:hover{background:var(--ink);color:var(--cream)}
.btn.primary{background:var(--ink);color:var(--cream)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover{background:#b53320}
.btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.ctrl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.progress-track{height:2px;background:var(--sand);border-radius:2px;margin-top:7px}
.progress-fill{height:100%;background:var(--ink);border-radius:2px;width:0;transition:width .35s}
.thumb-section{margin-top:14px}
.thumb-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#999;margin-bottom:7px}
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.thumb{aspect-ratio:4/3;border-radius:5px;background:var(--sand);overflow:hidden;position:relative;border:2px solid transparent;transition:all .18s}
.thumb.sel-able{cursor:pointer}
.thumb.sel-able:hover{border-color:var(--warm)}
.thumb.chosen{border-color:var(--ink)!important;box-shadow:0 0 0 2px var(--ink)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#ccc}
.thumb-badge{position:absolute;top:3px;right:3px;width:17px;height:17px;border-radius:50%;background:var(--ink);color:#fff;display:none;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.thumb.chosen .thumb-badge{display:flex}
.sel-hint{font-size:11px;color:var(--accent);margin-top:6px;min-height:16px}
.strip-preview{background:#fff;box-shadow:0 6px 32px rgba(0,0,0,.16);border-radius:4px;position:relative;overflow:hidden;flex-shrink:0;width:140px;padding:8px 8px 26px;display:flex;flex-direction:column;gap:4px}
.sp-slot{background:var(--sand);border-radius:2px;overflow:hidden;flex:1;position:relative;aspect-ratio:4/3}
.sp-slot img{width:100%;height:100%;object-fit:cover;display:block}
.sp-slot-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13px}
.strip-footer{text-align:center;position:absolute;bottom:0;left:0;right:0;padding:3px 0 5px}
.sft-date{font-size:6px;color:#bbb;letter-spacing:.08em}
.sft-brand{font-family:'DM Serif Display',serif;font-size:10px;color:var(--ink);font-style:italic}
.strip-frame-overlay{position:absolute;inset:0;z-index:10;pointer-events:none}
.strip-frame-overlay img{width:100%;height:100%;object-fit:fill;display:block}
#resultPanel{display:none;background:var(--ink);color:var(--cream);border-radius:var(--r);padding:18px;width:100%;text-align:center}
#resultPanel.show{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#resultPanel h3{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:4px}
#resultPanel p{font-size:10px;color:#888;margin-bottom:12px}
#qrcodeEl{display:inline-block;background:#fff;padding:7px;border-radius:6px;margin-bottom:12px}
.dl-row{display:flex;flex-direction:column;gap:7px}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:30px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:transform .15s}
.dl-btn:hover{transform:translateY(-1px)}
.dl-img{background:var(--cream);color:var(--ink)}
.dl-vid{background:var(--accent);color:#fff}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.pop{animation:popIn .25s ease forwards}
#stripCanvas,#snapCanvas,#videoCanvas{display:none}
@media(max-width:640px){.grid{flex-direction:column;align-items:center}.col-cam{max-width:100%;width:100%}.vf-wrap{max-height:60vh}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div><div class="logo">네컷 <em>Booth</em></div><div class="logo-sub">8장 촬영 → 4장 선택 → 스트립 완성</div></div>
    <div class="badge">PHOTO STUDIO</div>
  </header>
  <div class="steps">
    <div class="sp active" id="sp1">① 촬영</div>
    <div class="sp" id="sp2">② 사진 선택</div>
    <div class="sp" id="sp3">③ 완성 &amp; 저장</div>
  </div>
  <div class="grid">
    <div class="col-cam">
      <div class="vf-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="corners"><div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div></div>
        <div class="vf-hud"><div class="hud-top"><span class="pill" id="hudShot">0 / 8</span><span class="pill pill-rec" id="hudRec" style="display:none">REC</span></div></div>
        <div id="cdOvl"></div><div id="flashEl"></div>
        <div id="camStatus">
          <div class="cs-icon">📷</div>
          <div class="cs-title">카메라 연결 중...</div>
          <div id="csBody" style="font-size:11px;color:#ccc;margin-top:4px"></div>
          <button class="cs-retry" id="csRetryBtn" style="display:none" onclick="startCamera()">🔄 다시 연결</button>
        </div>
      </div>
      <div class="filter-row" id="filterRow">
        <button class="fb on" data-f="">원본</button>
        <button class="fb" data-f="grayscale(100%)">흑백</button>
        <button class="fb" data-f="sepia(70%)">세피아</button>
        <button class="fb" data-f="saturate(200%) hue-rotate(300deg) brightness(1.05)">핑크</button>
        <button class="fb" data-f="saturate(170%) contrast(108%)">비비드</button>
        <button class="fb" data-f="brightness(115%) contrast(88%) saturate(80%)">소프트</button>
        <button class="fb" data-f="hue-rotate(185deg) saturate(75%)">쿨톤</button>
      </div>
      <div class="ctrl-row">
        <button class="btn primary" id="shootBtn" disabled>📸 촬영 시작</button>
        <button class="btn" id="retakeBtn" style="display:none">↺ 다시 찍기</button>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <div class="thumb-section">
        <div class="thumb-label" id="thumbLabel">카메라 연결 후 촬영 버튼을 눌러주세요</div>
        <div class="thumb-grid" id="thumbGrid"></div>
        <div class="sel-hint" id="selHint"></div>
        <div class="ctrl-row" style="margin-top:8px"><button class="btn ok" id="confirmBtn" style="display:none">✓ 이 4장으로 결정</button></div>
      </div>
    </div>
    <div class="col-right">
      <div class="strip-preview" id="stripPrev">
        <div class="sp-slot" id="ss0"><div class="sp-slot-ph">①</div></div>
        <div class="sp-slot" id="ss1"><div class="sp-slot-ph">②</div></div>
        <div class="sp-slot" id="ss2"><div class="sp-slot-ph">③</div></div>
        <div class="sp-slot" id="ss3"><div class="sp-slot-ph">④</div></div>
        <div class="strip-footer"><div class="sft-date" id="stripDate"></div><div class="sft-brand">네컷사진 ✦</div></div>
        <div class="strip-frame-overlay" id="frameOverlay"></div>
      </div>
      <button class="btn accent" id="makeBtn" disabled>✨ 완성하기</button>
      <div id="resultPanel">
        <h3>완성! 🎉</h3>
        <p>QR코드로 이 페이지를 공유하거나 버튼으로 저장하세요</p>
        <div id="qrcodeEl"></div>
        <div class="dl-row">
          <button class="dl-btn dl-img" id="dlImg">🖼 이미지 저장 (JPG)</button>
          <button class="dl-btn dl-vid" id="dlVid">🎬 영상 저장 (WebM)</button>
        </div>
      </div>
    </div>
  </div>
</div>
<canvas id="snapCanvas"></canvas>
<canvas id="stripCanvas"></canvas>
<canvas id="videoCanvas"></canvas>
<script>
let mediaStream=null,photos=[],selected=[],activeFrame=null,curFilter='',isShooting=false,finalStrip=null,videoBlob=null,cameraReady=false;
const videoEl=document.getElementById('video'),camStatus=document.getElementById('camStatus'),csBody=document.getElementById('csBody'),csRetry=document.getElementById('csRetryBtn'),cdOvl=document.getElementById('cdOvl'),flashEl=document.getElementById('flashEl'),hudShot=document.getElementById('hudShot'),hudRec=document.getElementById('hudRec'),progFill=document.getElementById('progFill'),thumbGrid=document.getElementById('thumbGrid'),thumbLabel=document.getElementById('thumbLabel'),selHint=document.getElementById('selHint'),shootBtn=document.getElementById('shootBtn'),retakeBtn=document.getElementById('retakeBtn'),confirmBtn=document.getElementById('confirmBtn'),makeBtn=document.getElementById('makeBtn'),resultPanel=document.getElementById('resultPanel'),frameOvl=document.getElementById('frameOverlay'),snapCanvas=document.getElementById('snapCanvas'),stripCanvas=document.getElementById('stripCanvas'),videoCanvas=document.getElementById('videoCanvas');

function setCamStatus(icon,title,body,showRetry){camStatus.classList.remove('hidden');camStatus.querySelector('.cs-icon').textContent=icon;camStatus.querySelector('.cs-title').textContent=title;csBody.innerHTML=body||'';csRetry.style.display=showRetry?'inline-block':'none'}
function hideCamStatus(){camStatus.classList.add('hidden')}

async function startCamera(){
  setCamStatus('⏳','카메라 연결 중...','',false);shootBtn.disabled=true;cameraReady=false;
  if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null;videoEl.srcObject=null}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setCamStatus('🚫','카메라 API 미지원','HTTPS 환경에서만 카메라 접근이 가능합니다.',false);return}
  const tries=[{video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false},{video:{facingMode:'user'},audio:false},{video:true,audio:false}];
  let lastErr=null;
  for(const c of tries){try{mediaStream=await navigator.mediaDevices.getUserMedia(c);break}catch(e){lastErr=e;mediaStream=null}}
  if(!mediaStream){const msgs={NotAllowedError:'카메라 권한이 거부됐어요.<br>주소창 🔒 아이콘 → 카메라 <strong>허용</strong>',NotFoundError:'카메라를 찾을 수 없어요.',NotReadableError:'카메라가 다른 앱에서 사용 중이에요.'};setCamStatus('❌','카메라 연결 실패',msgs[lastErr?.name]||`오류: ${lastErr?.name}`,true);return}
  videoEl.srcObject=mediaStream;
  await Promise.race([new Promise(r=>{videoEl.onloadedmetadata=r}),new Promise(r=>setTimeout(r,4000))]);
  try{await videoEl.play()}catch(e){}
  await sleep(400);
  if(videoEl.videoWidth===0){setCamStatus('⚠️','영상 없음','카메라 드라이버를 확인해주세요.',true);return}
  cameraReady=true;hideCamStatus();shootBtn.disabled=false;thumbLabel.textContent='촬영 버튼을 눌러 8장을 찍어주세요';
}
window.addEventListener('load',startCamera);

document.getElementById('filterRow').addEventListener('click',e=>{const b=e.target.closest('.fb');if(!b)return;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');curFilter=b.dataset.f;videoEl.style.filter=curFilter||''});

function buildGrid(){thumbGrid.innerHTML='';for(let i=0;i<8;i++){const d=document.createElement('div');d.className='thumb';d.id='th'+i;d.innerHTML=photos[i]?`<img src="${photos[i].dataUrl}"><div class="thumb-badge" id="tb${i}"></div>`:`<div class="thumb-empty">${i+1}</div>`;thumbGrid.appendChild(d)}}
buildGrid();

shootBtn.addEventListener('click',()=>{if(isShooting||!cameraReady)return;runSession()});

async function runSession(){
  isShooting=true;photos=[];selected=[];shootBtn.disabled=true;retakeBtn.style.display='none';confirmBtn.style.display='none';makeBtn.disabled=true;resultPanel.classList.remove('show');hudRec.style.display='flex';progFill.style.width='0%';hudShot.textContent='0 / 8';thumbLabel.textContent='촬영 중...';selHint.textContent='';resetStripSlots();setStep(1);buildGrid();
  for(let i=0;i<8;i++){await doCountdown(5);snapPhoto(i);await sleep(700)}
  isShooting=false;hudRec.style.display='none';hudShot.textContent='8 / 8 ✓';progFill.style.width='100%';shootBtn.disabled=false;retakeBtn.style.display='inline-flex';thumbLabel.textContent='마음에 드는 4장을 골라주세요';
  for(let i=0;i<8;i++){const th=document.getElementById('th'+i);if(th){th.classList.add('sel-able');th.onclick=()=>toggleSel(i)}}
  updateSelHint();setStep(2);
}

function doCountdown(n){return new Promise(res=>{cdOvl.classList.add('show');cdOvl.textContent=n;const iv=setInterval(()=>{n--;if(n<=0){clearInterval(iv);cdOvl.classList.remove('show');res()}else cdOvl.textContent=n},1000)})}

function snapPhoto(idx){
  flashEl.classList.add('on');setTimeout(()=>flashEl.classList.remove('on'),90);
  const vw=videoEl.videoWidth||640,vh=videoEl.videoHeight||480;
  snapCanvas.width=vw;snapCanvas.height=vh;
  const ctx=snapCanvas.getContext('2d');
  if(curFilter)ctx.filter=curFilter;
  ctx.save();ctx.translate(vw,0);ctx.scale(-1,1);ctx.drawImage(videoEl,0,0,vw,vh);ctx.restore();
  const dataUrl=snapCanvas.toDataURL('image/jpeg',0.82);
  photos[idx]={dataUrl,filter:curFilter};
  const th=document.getElementById('th'+idx);
  if(th)th.innerHTML=`<img src="${dataUrl}" class="pop"><div class="thumb-badge" id="tb${idx}"></div>`;
  hudShot.textContent=`${idx+1} / 8`;progFill.style.width=`${(idx+1)/8*100}%`;
}

function toggleSel(idx){
  if(!photos[idx])return;
  const pos=selected.indexOf(idx);
  if(pos>-1){selected.splice(pos,1)}else{if(selected.length>=4){selHint.textContent='이미 4장 선택됐어요!';return}selected.push(idx)}
  refreshThumbStates();updateSelHint();updateStripPreview();
  confirmBtn.style.display=selected.length===4?'inline-flex':'none';
}
function refreshThumbStates(){for(let i=0;i<8;i++){const th=document.getElementById('th'+i),tb=document.getElementById('tb'+i);if(!th)continue;th.classList.toggle('chosen',selected.includes(i));if(tb)tb.textContent=selected.includes(i)?selected.indexOf(i)+1:''}}
function updateSelHint(){const n=selected.length;selHint.textContent=n<4?`${n}/4장 선택됨 — ${4-n}장 더 고르세요`:'✓ 4장 선택 완료!'}

confirmBtn.addEventListener('click',()=>{
  if(selected.length!==4)return;
  makeBtn.disabled=false;confirmBtn.style.display='none';thumbLabel.textContent='선택 완료 ✓  완성하기를 눌러주세요';selHint.textContent='';
  for(let i=0;i<8;i++){const th=document.getElementById('th'+i);if(th){th.classList.remove('sel-able');th.onclick=null}}
  setStep(3);
});
retakeBtn.addEventListener('click',()=>{photos=[];selected=[];progFill.style.width='0%';hudShot.textContent='0 / 8';buildGrid();thumbLabel.textContent='촬영 버튼을 눌러 8장을 찍어주세요';selHint.textContent='';confirmBtn.style.display='none';makeBtn.disabled=true;resultPanel.classList.remove('show');resetStripSlots();setStep(1)});

document.getElementById('stripDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
function updateStripPreview(){for(let i=0;i<4;i++){const slot=document.getElementById('ss'+i);if(!slot)continue;const pi=selected[i];slot.innerHTML=(pi!==undefined&&photos[pi])?`<img src="${photos[pi].dataUrl}" class="pop">`:`<div class="sp-slot-ph">${i+1}</div>`}}
function resetStripSlots(){for(let i=0;i<4;i++){const s=document.getElementById('ss'+i);if(s)s.innerHTML=`<div class="sp-slot-ph">${i+1}</div>`}}

window.setFrame=function(dataUrl){activeFrame=dataUrl;frameOvl.innerHTML=dataUrl?`<img src="${dataUrl}">`:''}

makeBtn.addEventListener('click',async()=>{
  if(selected.length!==4)return;
  makeBtn.disabled=true;const orig=makeBtn.textContent;makeBtn.textContent='만드는 중...';
  await sleep(30);
  try{finalStrip=await renderStrip();videoBlob=await buildVideo();showResult()}
  catch(e){console.error(e);alert('오류: '+e.message)}
  makeBtn.textContent=orig;makeBtn.disabled=false;
});

async function renderStrip(){
  const BW=204,PX=10,PT=10,GAP=5,FOOT=38;
  const PW=BW-PX*2,PH=Math.round(PW*3/4);
  const BH=PT+4*(PH+GAP)-GAP+FOOT;
  stripCanvas.width=BW*4;stripCanvas.height=BH*4;
  const ctx=stripCanvas.getContext('2d');
  ctx.scale(4,4);
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,BW,BH);
  for(let i=0;i<4;i++){const y=PT+i*(PH+GAP),p=photos[selected[i]];if(p)await drawCrop(ctx,p.dataUrl,PX,y,PW,PH);else{ctx.fillStyle='#e8e0d4';ctx.fillRect(PX,y,PW,PH)}}
  const fy=BH-FOOT+6;
  ctx.fillStyle='#aaa';ctx.font='7px sans-serif';ctx.textAlign='center';ctx.fillText(document.getElementById('stripDate').textContent,BW/2,fy+8);
  ctx.fillStyle='#0f0d0b';ctx.font='italic bold 11px serif';ctx.fillText('네컷사진 ✦',BW/2,fy+22);
  if(activeFrame)await drawFill(ctx,activeFrame,0,0,BW,BH);
  return stripCanvas.toDataURL('image/jpeg',0.9);
}

function drawCrop(ctx,url,x,y,w,h){return new Promise(res=>{const img=new Image();img.onload=()=>{const ir=img.width/img.height,br=w/h;let sx=0,sy=0,sw=img.width,sh=img.height;if(ir>br){sw=img.height*br;sx=(img.width-sw)/2}else{sh=img.width/br;sy=(img.height-sh)/2}ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);res()};img.onerror=res;img.src=url})}
function drawFill(ctx,url,x,y,w,h){return new Promise(res=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,x,y,w,h);res()};img.onerror=res;img.src=url})}

async function buildVideo(){
  return new Promise(async resolve=>{
    const W=540,H=960,FPS=30,SEC=2;
    videoCanvas.width=W;videoCanvas.height=H;
    const ctx=videoCanvas.getContext('2d');
    const imgs=await Promise.all(selected.map(i=>loadImg(photos[i].dataUrl)));
    const TOTAL=Math.ceil(imgs.length*SEC*FPS)+FPS;
    const chunks=[];
    const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
    let mr=null;
    for(const mt of mimes){if(MediaRecorder.isTypeSupported(mt)){mr=new MediaRecorder(videoCanvas.captureStream(FPS),{mimeType:mt});break}}
    if(!mr){resolve(null);return}
    mr.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};
    mr.onstop=()=>resolve(new Blob(chunks,{type:'video/webm'}));
    mr.start(100);
    let frame=0;
    const tick=()=>{
      if(frame>=TOTAL){mr.stop();return}
      const t=frame/FPS,iIdx=Math.min(Math.floor(t/SEC),imgs.length-1),lT=(t%SEC)/SEC,img=imgs[iIdx];
      ctx.fillStyle='#0f0d0b';ctx.fillRect(0,0,W,H);
      if(img){const sc=Math.max(W/img.width,H/img.height)*(1+lT*0.03);const dw=img.width*sc,dh=img.height*sc;const alpha=(frame<8)?frame/8:(iIdx>0&&t%SEC<0.18?(t%SEC)/0.18:1);ctx.globalAlpha=Math.min(alpha,1);ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);ctx.globalAlpha=1}
      ctx.fillStyle='rgba(0,0,0,.5)';rrect(ctx,W-60,H-40,48,24,12);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(`${iIdx+1}/${imgs.length}`,W-36,H-22);
      ctx.fillStyle='#d4402a';ctx.fillRect(0,0,W,4);
      frame++;requestAnimationFrame(tick);
    };
    tick();
  });
}
function loadImg(url){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=url})}
function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}

function showResult(){

}
