<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>네컷사진 부스</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --ink:    #0f0d0b;
  --cream:  #faf7f2;
  --sand:   #e8e0d4;
  --warm:   #c8a882;
  --accent: #d4402a;
  --ok:     #2a7a4a;
  --r: 10px;
  --shadow: 0 2px 24px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;
}

.app{max-width:1080px;margin:0 auto;padding:28px 20px 80px}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:16px;
  border-bottom:1.5px solid var(--ink);
  padding-bottom:14px;margin-bottom:28px;
}
.logo{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,32px);letter-spacing:-.02em}
.logo em{font-style:italic;color:var(--accent)}
.logo-sub{font-size:11px;color:#999;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
header .badge{
  margin-left:auto;background:var(--ink);color:var(--cream);
  font-size:10px;letter-spacing:.1em;padding:4px 12px;border-radius:20px;white-space:nowrap;
}

/* ── STEPS ── */
.steps{display:flex;gap:0;border:1.5px solid var(--ink);border-radius:30px;overflow:hidden;width:fit-content;margin-bottom:24px}
.sp{padding:6px 18px;font-size:12px;font-weight:500;letter-spacing:.05em;color:#aaa;transition:all .2s;border-right:1.5px solid var(--ink);white-space:nowrap}
.sp:last-child{border-right:none}
.sp.active{background:var(--ink);color:var(--cream)}
.sp.done{color:var(--warm)}

/* ── GRID ── */
.grid{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.col-cam{flex:1;min-width:300px;max-width:520px}
.col-right{flex-shrink:0;display:flex;flex-direction:column;gap:16px;align-items:center}

/* ── VIEWFINDER ── */
.vf-wrap{
  position:relative;background:#111;border-radius:var(--r);
  overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow);
}
#video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}

/* Status overlay (shown when no camera) */
#camStatus{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;background:rgba(0,0,0,.75);color:#fff;
  font-size:13px;text-align:center;padding:24px;
  line-height:1.7;
}
#camStatus.hidden{display:none}
#camStatus .cs-icon{font-size:36px;margin-bottom:4px}
#camStatus .cs-title{font-size:15px;font-weight:700}
#camStatus .cs-steps{font-size:12px;color:#ccc;text-align:left;line-height:2}
.cs-retry{
  margin-top:4px;padding:8px 20px;border-radius:20px;
  background:#fff;color:var(--ink);border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:background .15s;
}
.cs-retry:hover{background:#eee}

/* HUD */
.vf-hud{position:absolute;inset:0;pointer-events:none;padding:12px;display:flex;flex-direction:column;justify-content:space-between}
.hud-top{display:flex;justify-content:space-between}
.pill{background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:3px 11px;border-radius:20px;backdrop-filter:blur(6px);letter-spacing:.04em}
.pill-rec{display:inline-flex;align-items:center;gap:5px;color:#ff4d4d}
.pill-rec::before{content:'';width:6px;height:6px;border-radius:50%;background:#ff3b30;animation:blink 1s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* Corners */
.corners{position:absolute;inset:0;pointer-events:none}
.c{position:absolute;width:16px;height:16px;border-color:rgba(255,255,255,.65);border-style:solid}
.c.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.c.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.c.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.c.br{bottom:10px;right:10px;border-width:0 2px 2px 0}

/* Countdown */
#cdOvl{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.38);font-family:'DM Serif Display',serif;
  font-size:110px;color:#fff;opacity:0;pointer-events:none;transition:opacity .12s;
}
#cdOvl.show{opacity:1}
#flashEl{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .05s}
#flashEl.on{opacity:1}

/* ── FILTERS ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:11px 0 8px}
.fb{
  padding:4px 13px;border-radius:20px;border:1.5px solid var(--sand);
  background:#fff;font-size:11px;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;color:#777;transition:all .15s;
}
.fb.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 22px;border-radius:30px;border:1.5px solid var(--ink);
  background:transparent;font-family:'Noto Sans KR',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;color:var(--ink);
  transition:all .18s;white-space:nowrap;
}
.btn:hover{background:var(--ink);color:var(--cream)}
.btn.primary{background:var(--ink);color:var(--cream)}
.btn.primary:hover{background:#333}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover{background:#b53320}
.btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.btn.ok:hover{background:#1e5e38}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.ctrl-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

.progress-track{height:2px;background:var(--sand);border-radius:2px;margin-top:8px}
.progress-fill{height:100%;background:var(--ink);border-radius:2px;width:0;transition:width .35s}

/* ── THUMBNAILS ── */
.thumb-section{margin-top:16px}
.thumb-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#999;margin-bottom:8px}
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.thumb{
  aspect-ratio:4/3;border-radius:6px;background:var(--sand);
  overflow:hidden;position:relative;border:2px solid transparent;transition:all .18s;
}
.thumb.sel-able{cursor:pointer}
.thumb.sel-able:hover{border-color:var(--warm)}
.thumb.chosen{border-color:var(--ink) !important;box-shadow:0 0 0 2px var(--ink)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#ccc}
.thumb-badge{
  position:absolute;top:4px;right:4px;width:19px;height:19px;border-radius:50%;
  background:var(--ink);color:#fff;display:none;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
}
.thumb.chosen .thumb-badge{display:flex}
.sel-hint{font-size:12px;color:var(--accent);margin-top:7px;min-height:18px}

/* ── STRIP PANEL ── */
.strip-preview{
  background:#fff;box-shadow:0 6px 32px rgba(0,0,0,.16);
  border-radius:4px;position:relative;overflow:hidden;flex-shrink:0;
  width:152px;padding:9px 9px 28px;display:flex;flex-direction:column;gap:4px;
}
.sp-slot{background:var(--sand);border-radius:2px;overflow:hidden;flex:1;position:relative;height:88px}
.sp-slot img{width:100%;height:100%;object-fit:cover;display:block}
.sp-slot-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:14px}

.strip-footer{text-align:center;position:absolute;bottom:0;left:0;right:0;padding:4px 0 6px}
.sft-date{font-size:7px;color:#bbb;letter-spacing:.08em}
.sft-brand{font-family:'DM Serif Display',serif;font-size:11px;color:var(--ink);font-style:italic}

/* Frame overlay on strip */
.strip-frame-overlay{position:absolute;inset:0;z-index:10;pointer-events:none}
.strip-frame-overlay img{width:100%;height:100%;object-fit:fill;display:block}

/* ── RESULT ── */
#resultPanel{display:none;background:var(--ink);color:var(--cream);border-radius:var(--r);padding:20px;width:100%;text-align:center}
#resultPanel.show{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#resultPanel h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
#resultPanel p{font-size:11px;color:#888;margin-bottom:14px}
#qrcodeEl{display:inline-block;background:#fff;padding:8px;border-radius:6px;margin-bottom:14px}
.dl-row{display:flex;flex-direction:column;gap:8px}
.dl-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:30px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:transform .15s;
}
.dl-btn:hover{transform:translateY(-1px)}
.dl-img{background:var(--cream);color:var(--ink)}
.dl-vid{background:var(--accent);color:#fff}

@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.pop{animation:popIn .25s ease forwards}

#stripCanvas,#snapCanvas,#videoCanvas{display:none}

@media(max-width:680px){
  .grid{flex-direction:column;align-items:center}
  .col-cam{max-width:100%;width:100%}
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">네컷 <em>Booth</em></div>
      <div class="logo-sub">8장 촬영 → 4장 선택 → 스트립 완성</div>
    </div>
    <div class="badge">PHOTO STUDIO</div>
  </header>

  <div class="steps">
    <div class="sp active" id="sp1">① 촬영</div>
    <div class="sp" id="sp2">② 사진 선택</div>
    <div class="sp" id="sp3">③ 완성 &amp; 저장</div>
  </div>

  <div class="grid">

    <!-- ══ CAMERA ══ -->
    <div class="col-cam">
      <div class="vf-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="corners"><div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div></div>
        <div class="vf-hud">
          <div class="hud-top">
            <span class="pill" id="hudShot">0 / 8</span>
            <span class="pill pill-rec" id="hudRec" style="display:none">REC</span>
          </div>
        </div>
        <div id="cdOvl"></div>
        <div id="flashEl"></div>

        <!-- Camera status / error shown inside viewfinder -->
        <div id="camStatus">
          <div class="cs-icon">📷</div>
          <div class="cs-title">카메라 연결 중...</div>
          <div id="csBody" style="font-size:12px;color:#ccc;margin-top:4px"></div>
          <button class="cs-retry" id="csRetryBtn" style="display:none" onclick="startCamera()">🔄 다시 연결</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-row" id="filterRow">
        <button class="fb on" data-f="">원본</button>
        <button class="fb" data-f="grayscale(100%)">흑백</button>
        <button class="fb" data-f="sepia(70%)">세피아</button>
        <button class="fb" data-f="saturate(200%) hue-rotate(300deg) brightness(1.05)">핑크</button>
        <button class="fb" data-f="saturate(170%) contrast(108%)">비비드</button>
        <button class="fb" data-f="brightness(115%) contrast(88%) saturate(80%)">소프트</button>
        <button class="fb" data-f="hue-rotate(185deg) saturate(75%)">쿨톤</button>
      </div>

      <div class="ctrl-row">
        <button class="btn primary" id="shootBtn" disabled>📸 촬영 시작</button>
        <button class="btn" id="retakeBtn" style="display:none">↺ 다시 찍기</button>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>

      <!-- Thumb grid -->
      <div class="thumb-section">
        <div class="thumb-label" id="thumbLabel">카메라 연결 후 촬영 버튼을 눌러주세요</div>
        <div class="thumb-grid" id="thumbGrid"></div>
        <div class="sel-hint" id="selHint"></div>
        <div class="ctrl-row" style="margin-top:8px">
          <button class="btn ok" id="confirmBtn" style="display:none">✓ 이 4장으로 결정</button>
        </div>
      </div>
    </div>

    <!-- ══ STRIP ══ -->
    <div class="col-right">

      <!-- Preview -->
      <div class="strip-preview narrow" id="stripPrev">
        <div class="sp-slot" id="ss0"><div class="sp-slot-ph">①</div></div>
        <div class="sp-slot" id="ss1"><div class="sp-slot-ph">②</div></div>
        <div class="sp-slot" id="ss2"><div class="sp-slot-ph">③</div></div>
        <div class="sp-slot" id="ss3"><div class="sp-slot-ph">④</div></div>
        <div class="strip-footer">
          <div class="sft-date" id="stripDate"></div>
          <div class="sft-brand">네컷사진 ✦</div>
        </div>
        <div class="strip-frame-overlay" id="frameOverlay"></div>
      </div>

      <button class="btn accent" id="makeBtn" disabled>✨ 완성하기</button>

      <!-- Result -->
      <div id="resultPanel">
        <h3>완성! 🎉</h3>
        <p>QR코드 스캔 또는 버튼으로 저장하세요</p>
        <div id="qrcodeEl"></div>
        <div class="dl-row">
          <button class="dl-btn dl-img" id="dlImg">🖼 이미지 저장 (JPG)</button>
          <button class="dl-btn dl-vid" id="dlVid">🎬 영상 저장 (WebM)</button>
        </div>
      </div>
    </div>
  </div>
</div>

<canvas id="snapCanvas"></canvas>
<canvas id="stripCanvas"></canvas>
<canvas id="videoCanvas"></canvas>

<script>
/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let mediaStream  = null;   // MediaStream
let photos       = [];     // [{dataUrl, filter}] × up to 8
let selected     = [];     // chosen indices (max 4)
let activeFrame  = null;   // dataUrl | null  (set externally via setFrame())
const stripType  = 'narrow';
let curFilter    = '';
let isShooting   = false;
let finalStrip   = null;
let videoBlob    = null;
let cameraReady  = false;

/* ═══════════════════════════════════════════════
   ELEMENTS
═══════════════════════════════════════════════ */
const videoEl    = document.getElementById('video');
const camStatus  = document.getElementById('camStatus');
const csBody     = document.getElementById('csBody');
const csRetry    = document.getElementById('csRetryBtn');
const cdOvl      = document.getElementById('cdOvl');
const flashEl    = document.getElementById('flashEl');
const hudShot    = document.getElementById('hudShot');
const hudRec     = document.getElementById('hudRec');
const progFill   = document.getElementById('progFill');
const thumbGrid  = document.getElementById('thumbGrid');
const thumbLabel = document.getElementById('thumbLabel');
const selHint    = document.getElementById('selHint');
const shootBtn   = document.getElementById('shootBtn');
const retakeBtn  = document.getElementById('retakeBtn');
const confirmBtn = document.getElementById('confirmBtn');
const makeBtn    = document.getElementById('makeBtn');
const resultPanel= document.getElementById('resultPanel');
const stripPrev  = document.getElementById('stripPrev');
const frameOvl   = document.getElementById('frameOverlay');
const snapCanvas = document.getElementById('snapCanvas');
const stripCanvas= document.getElementById('stripCanvas');
const videoCanvas= document.getElementById('videoCanvas');

/* ═══════════════════════════════════════════════
   CAMERA  ← completely rewritten
═══════════════════════════════════════════════ */
function setCamStatus(icon, title, body, showRetry) {
  camStatus.classList.remove('hidden');
  camStatus.querySelector('.cs-icon').textContent = icon;
  camStatus.querySelector('.cs-title').textContent = title;
  csBody.innerHTML = body || '';
  csRetry.style.display = showRetry ? 'inline-block' : 'none';
}

function hideCamStatus() {
  camStatus.classList.add('hidden');
}

async function startCamera() {
  setCamStatus('⏳', '카메라 연결 중...', '', false);
  shootBtn.disabled = true;
  cameraReady = false;

  // Stop previous stream
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
    videoEl.srcObject = null;
  }

  // Check API availability
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setCamStatus('🚫', '카메라 API 미지원',
      '이 브라우저는 카메라 접근을 지원하지 않아요.<br>' +
      '➜ Chrome, Edge, Firefox, Safari 최신 버전을 사용해주세요.<br>' +
      '➜ <strong>로컬 파일(file://)</strong>은 일부 브라우저에서 카메라가 차단됩니다.<br>' +
      '&nbsp;&nbsp;&nbsp;파일을 <code>localhost</code>로 서빙하거나<br>' +
      '&nbsp;&nbsp;&nbsp;Chrome 실행 시 <code>--allow-file-access-from-files</code> 플래그를 추가하세요.',
      false);
    return;
  }

  // Try constraints in order (most specific → fallback)
  const tryList = [
    { video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } }, audio: false },
    { video: { facingMode: 'user' }, audio: false },
    { video: { width: { ideal: 640 } }, audio: false },
    { video: true, audio: false },
  ];

  let lastErr = null;
  for (const constraints of tryList) {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
      break;
    } catch (e) {
      lastErr = e;
      console.warn('[camera] attempt failed:', constraints, e.name, e.message);
      mediaStream = null;
    }
  }

  if (!mediaStream) {
    // Detailed error messages per DOMException name
    const msgs = {
      NotAllowedError:
        '카메라 권한이 거부됐어요.<br>' +
        '① 주소창 왼쪽 🔒/📷 아이콘 클릭 → 카메라 <strong>허용</strong><br>' +
        '② 그래도 안 되면: 브라우저 설정 → 개인정보 → 사이트 설정 → 카메라<br>' +
        '③ <strong>file://</strong> 로 열었다면 Chrome에<br>&nbsp;&nbsp;<code>--allow-file-access-from-files</code> 옵션을 추가하세요',
      NotFoundError:
        '카메라 장치를 찾을 수 없어요.<br>카메라가 연결되어 있는지 확인해주세요.',
      NotReadableError:
        '카메라가 다른 앱에서 사용 중이에요.<br>다른 탭이나 앱(Zoom, 회의 앱 등)을 닫고 다시 시도하세요.',
      OverconstrainedError:
        '카메라 해상도 설정 오류입니다. 다시 시도해주세요.',
      SecurityError:
        'HTTPS 또는 localhost 환경에서만 카메라 접근이 허용돼요.<br>' +
        '파일을 로컬 서버로 열어주세요.',
    };
    const name  = lastErr ? lastErr.name : 'Unknown';
    const detail = msgs[name] || `오류: ${name} — ${lastErr ? lastErr.message : ''}`;
    setCamStatus('❌', '카메라 연결 실패', detail, true);
    return;
  }

  // Stream OK — attach to video element
  videoEl.srcObject = mediaStream;

  // Wait for video metadata (with timeout)
  await Promise.race([
    new Promise(res => { videoEl.onloadedmetadata = res; }),
    new Promise(res => setTimeout(res, 4000)),
  ]);

  try { await videoEl.play(); } catch(e) { console.warn('play()', e); }

  // Extra check: if video is still black (e.g., wrong track)
  await sleep(400);
  if (videoEl.videoWidth === 0 || videoEl.videoHeight === 0) {
    setCamStatus('⚠️', '카메라 영상 없음',
      '스트림은 연결됐지만 영상 데이터가 없어요.<br>' +
      '카메라 드라이버를 확인하거나 다른 브라우저를 시도해보세요.',
      true);
    return;
  }

  cameraReady = true;
  hideCamStatus();
  shootBtn.disabled = false;
  thumbLabel.textContent = '촬영 버튼을 눌러 8장을 찍어주세요';
}

// Auto-start on load
window.addEventListener('load', startCamera);

/* ═══════════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════════ */
document.getElementById('filterRow').addEventListener('click', e => {
  const b = e.target.closest('.fb');
  if (!b) return;
  document.querySelectorAll('.fb').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  curFilter = b.dataset.f;
  videoEl.style.filter = curFilter || '';
});

/* ═══════════════════════════════════════════════
   THUMBNAIL GRID
═══════════════════════════════════════════════ */
function buildGrid() {
  thumbGrid.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const d = document.createElement('div');
    d.className = 'thumb';
    d.id = 'th' + i;
    d.innerHTML = photos[i]
      ? `<img src="${photos[i].dataUrl}"><div class="thumb-badge" id="tb${i}"></div>`
      : `<div class="thumb-empty">${i + 1}</div>`;
    thumbGrid.appendChild(d);
  }
}
buildGrid();

/* ═══════════════════════════════════════════════
   SHOOT SEQUENCE
═══════════════════════════════════════════════ */
shootBtn.addEventListener('click', () => {
  if (isShooting || !cameraReady) return;
  runSession();
});

async function runSession() {
  isShooting = true;
  photos = []; selected = [];
  shootBtn.disabled = true;
  retakeBtn.style.display = 'none';
  confirmBtn.style.display = 'none';
  makeBtn.disabled = true;
  resultPanel.classList.remove('show');
  hudRec.style.display = 'flex';
  progFill.style.width = '0%';
  hudShot.textContent = '0 / 8';
  thumbLabel.textContent = '촬영 중... 잠시 기다려주세요';
  selHint.textContent = '';
  resetStripSlots();
  setStep(1);
  buildGrid();

  for (let i = 0; i < 8; i++) {
    await doCountdown(3);
    snapPhoto(i);
    await sleep(900);
  }

  isShooting = false;
  hudRec.style.display = 'none';
  hudShot.textContent = '8 / 8 ✓';
  progFill.style.width = '100%';
  shootBtn.disabled = false;
  retakeBtn.style.display = 'inline-flex';
  thumbLabel.textContent = '마음에 드는 4장을 골라주세요 (순서대로 스트립에 들어가요)';

  for (let i = 0; i < 8; i++) {
    const th = document.getElementById('th' + i);
    if (th) { th.classList.add('sel-able'); th.onclick = () => toggleSel(i); }
  }
  updateSelHint();
  setStep(2);
}

function doCountdown(n) {
  return new Promise(res => {
    cdOvl.classList.add('show');
    cdOvl.textContent = n;
    const iv = setInterval(() => {
      n--;
      if (n <= 0) { clearInterval(iv); cdOvl.classList.remove('show'); res(); }
      else cdOvl.textContent = n;
    }, 1000);
  });
}

function snapPhoto(idx) {
  // Flash effect
  flashEl.classList.add('on');
  setTimeout(() => flashEl.classList.remove('on'), 90);

  const vw = videoEl.videoWidth  || 640;
  const vh = videoEl.videoHeight || 480;
  snapCanvas.width  = vw;
  snapCanvas.height = vh;
  const ctx = snapCanvas.getContext('2d');

  // Apply CSS filter on canvas
  if (curFilter) ctx.filter = curFilter;

  // Mirror horizontally (selfie camera)
  ctx.save();
  ctx.translate(vw, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(videoEl, 0, 0, vw, vh);
  ctx.restore();

  const dataUrl = snapCanvas.toDataURL('image/jpeg', 0.93);
  photos[idx] = { dataUrl, filter: curFilter };

  // Update thumb
  const th = document.getElementById('th' + idx);
  if (th) th.innerHTML = `<img src="${dataUrl}" class="pop"><div class="thumb-badge" id="tb${idx}"></div>`;

  hudShot.textContent = `${idx + 1} / 8`;
  progFill.style.width = `${(idx + 1) / 8 * 100}%`;
}

/* ═══════════════════════════════════════════════
   SELECTION
═══════════════════════════════════════════════ */
function toggleSel(idx) {
  if (!photos[idx]) return;
  const pos = selected.indexOf(idx);
  if (pos > -1) {
    selected.splice(pos, 1);
  } else {
    if (selected.length >= 4) {
      selHint.textContent = '이미 4장 선택됐어요! 해제 후 다시 고르세요.';
      return;
    }
    selected.push(idx);
  }
  refreshThumbStates();
  updateSelHint();
  updateStripPreview();
  confirmBtn.style.display = selected.length === 4 ? 'inline-flex' : 'none';
}

function refreshThumbStates() {
  for (let i = 0; i < 8; i++) {
    const th = document.getElementById('th' + i);
    const tb = document.getElementById('tb' + i);
    if (!th) continue;
    const isChosen = selected.includes(i);
    th.classList.toggle('chosen', isChosen);
    if (tb) tb.textContent = isChosen ? selected.indexOf(i) + 1 : '';
  }
}

function updateSelHint() {
  const n = selected.length;
  selHint.textContent = n < 4
    ? `${n}/4장 선택됨 — ${4 - n}장 더 고르세요`
    : '✓ 4장 선택 완료! 확정 버튼을 눌러주세요';
}

confirmBtn.addEventListener('click', () => {
  if (selected.length !== 4) return;
  makeBtn.disabled = false;
  confirmBtn.style.display = 'none';
  thumbLabel.textContent = '선택 완료 ✓  프레임 선택 후 완성하기를 눌러주세요';
  selHint.textContent = '';
  for (let i = 0; i < 8; i++) {
    const th = document.getElementById('th' + i);
    if (th) { th.classList.remove('sel-able'); th.onclick = null; }
  }
  setStep(3);
});

retakeBtn.addEventListener('click', () => {
  photos = []; selected = [];
  progFill.style.width = '0%';
  hudShot.textContent = '0 / 8';
  buildGrid();
  thumbLabel.textContent = '촬영 버튼을 눌러 8장을 찍어주세요';
  selHint.textContent = '';
  confirmBtn.style.display = 'none';
  makeBtn.disabled = true;
  resultPanel.classList.remove('show');
  resetStripSlots();
  setStep(1);
});

/* ═══════════════════════════════════════════════
   STRIP PREVIEW
═══════════════════════════════════════════════ */
document.getElementById('stripDate').textContent =
  new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

function updateStripPreview() {
  for (let i = 0; i < 4; i++) {
    const slot = document.getElementById('ss' + i);
    if (!slot) continue;
    const pi = selected[i];
    slot.innerHTML = (pi !== undefined && photos[pi])
      ? `<img src="${photos[pi].dataUrl}" class="pop">`
      : `<div class="sp-slot-ph">${i + 1}</div>`;
  }
}

function resetStripSlots() {
  for (let i = 0; i < 4; i++) {
    const s = document.getElementById('ss' + i);
    if (s) s.innerHTML = `<div class="sp-slot-ph">${i + 1}</div>`;
  }
}


/* ═══════════════════════════════════════════════
   FRAME MANAGEMENT  (set by external call)
   Call window.setFrame(dataUrl) to apply a frame.
   Call window.setFrame(null)    to remove frame.
═══════════════════════════════════════════════ */
window.setFrame = function(dataUrl) {
  activeFrame = dataUrl;
  frameOvl.innerHTML = dataUrl
    ? `<img src="${dataUrl}">`
    : '';
};

/* ═══════════════════════════════════════════════
   MAKE STRIP
═══════════════════════════════════════════════ */
makeBtn.addEventListener('click', async () => {
  if (selected.length !== 4) return;
  makeBtn.disabled = true;
  const orig = makeBtn.textContent;
  makeBtn.textContent = '만드는 중...';
  await sleep(30);
  try {
    finalStrip = await renderStrip();
    videoBlob  = await buildVideo();
    showResult();
  } catch (e) {
    console.error(e);
    alert('오류: ' + e.message);
  }
  makeBtn.textContent = orig;
  makeBtn.disabled = false;
});

/* Canvas render */
async function renderStrip() {
  const narrow = (stripType === 'narrow');
  // At 4× scale for quality
  // narrow 51×152mm → base 170×507px  |  wide 62×182mm → base 207×607px
  const BW   = narrow ? 170 : 207;
  const PX   = narrow ? 10  : 13;
  const PT   = narrow ? 10  : 13;
  const PH   = narrow ? 88  : 112;   // photo height
  const GAP  = narrow ? 4   : 6;
  const FOOT = narrow ? 34  : 40;
  const BH   = PT + 4 * (PH + GAP) - GAP + FOOT;

  stripCanvas.width  = BW * 4;
  stripCanvas.height = BH * 4;
  const ctx = stripCanvas.getContext('2d');
  ctx.scale(4, 4);

  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, BW, BH);

  // Photos
  const PW = BW - PX * 2;
  for (let i = 0; i < 4; i++) {
    const y = PT + i * (PH + GAP);
    const p = photos[selected[i]];
    if (p) await drawCrop(ctx, p.dataUrl, PX, y, PW, PH);
    else { ctx.fillStyle = '#e8e0d4'; ctx.fillRect(PX, y, PW, PH); }
  }

  // Footer
  const fy = BH - FOOT + 6;
  ctx.fillStyle = '#aaa';
  ctx.font = `${narrow ? 7 : 8}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(document.getElementById('stripDate').textContent, BW / 2, fy + 8);
  ctx.fillStyle = '#0f0d0b';
  ctx.font = `italic bold ${narrow ? 11 : 13}px serif`;
  ctx.fillText('네컷사진 ✦', BW / 2, fy + 22);

  // Frame
  if (activeFrame) await drawFill(ctx, activeFrame, 0, 0, BW, BH);

  return stripCanvas.toDataURL('image/jpeg', 0.95);
}

function drawCrop(ctx, url, x, y, w, h) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const ir = img.width / img.height, br = w / h;
      let sx = 0, sy = 0, sw = img.width, sh = img.height;
      if (ir > br) { sw = img.height * br; sx = (img.width - sw) / 2; }
      else         { sh = img.width / br;  sy = (img.height - sh) / 2; }
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
      res();
    };
    img.onerror = res;
    img.src = url;
  });
}

function drawFill(ctx, url, x, y, w, h) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, x, y, w, h); res(); };
    img.onerror = res;
    img.src = url;
  });
}

/* ═══════════════════════════════════════════════
   VIDEO
═══════════════════════════════════════════════ */
async function buildVideo() {
  return new Promise(async resolve => {
    const W = 540, H = 960, FPS = 30, SEC = 1.8;
    videoCanvas.width = W; videoCanvas.height = H;
    const ctx = videoCanvas.getContext('2d');

    const imgs = await Promise.all(selected.map(i => loadImg(photos[i].dataUrl)));

    const TOTAL = Math.ceil(imgs.length * SEC * FPS) + FPS;
    const chunks = [];
    const mimes = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
    let mr = null;
    for (const mt of mimes) {
      if (MediaRecorder.isTypeSupported(mt)) {
        mr = new MediaRecorder(videoCanvas.captureStream(FPS), { mimeType: mt });
        break;
      }
    }
    if (!mr) { resolve(null); return; }

    mr.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    mr.onstop = () => resolve(new Blob(chunks, { type: 'video/webm' }));
    mr.start(100);

    let frame = 0;
    const tick = () => {
      if (frame >= TOTAL) { mr.stop(); return; }
      const t    = frame / FPS;
      const iIdx = Math.min(Math.floor(t / SEC), imgs.length - 1);
      const lT   = (t % SEC) / SEC;
      const img  = imgs[iIdx];

      ctx.fillStyle = '#0f0d0b';
      ctx.fillRect(0, 0, W, H);

      if (img) {
        const sc = Math.max(W / img.width, H / img.height) * (1 + lT * 0.03);
        const dw = img.width * sc, dh = img.height * sc;
        const alpha = (frame < 8) ? frame / 8 : (iIdx > 0 && t % SEC < 0.18 ? (t % SEC) / 0.18 : 1);
        ctx.globalAlpha = Math.min(alpha, 1);
        ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
        ctx.globalAlpha = 1;
      }

      // counter badge
      ctx.fillStyle = 'rgba(0,0,0,.5)';
      rrect(ctx, W - 62, H - 42, 50, 26, 13); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`${iIdx + 1}/${imgs.length}`, W - 37, H - 23);

      // accent bar
      ctx.fillStyle = '#d4402a'; ctx.fillRect(0, 0, W, 4);

      frame++;
      requestAnimationFrame(tick);
    };
    tick();
  });
}

function loadImg(url) {
  return new Promise(res => {
    const i = new Image();
    i.onload = () => res(i); i.onerror = () => res(null); i.src = url;
  });
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* ═══════════════════════════════════════════════
   RESULT
═══════════════════════════════════════════════ */
function showResult() {
  resultPanel.classList.add('show');
  document.getElementById('qrcodeEl').innerHTML = '';
  new QRCode(document.getElementById('qrcodeEl'), {
    text: `네컷사진 ${new Date().toLocaleString('ko-KR')}`,
    width: 140, height: 140,
    colorDark: '#0f0d0b', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });
  document.getElementById('dlImg').onclick = () => {
    const a = document.createElement('a');
    a.href = finalStrip; a.download = `네컷사진_${Date.now()}.jpg`; a.click();
  };
  document.getElementById('dlVid').onclick = () => {
    if (!videoBlob) { alert('영상 처리 중입니다. 잠시 후 다시 눌러주세요.'); return; }
    const u = URL.createObjectURL(videoBlob);
    const a = document.createElement('a');
    a.href = u; a.download = `네컷영상_${Date.now()}.webm`; a.click();
    setTimeout(() => URL.revokeObjectURL(u), 5000);
  };
}

/* ═══════════════════════════════════════════════
   STEPS / UTILS
═══════════════════════════════════════════════ */
function setStep(n) {
  [1, 2, 3].forEach(i => {
    const el = document.getElementById('sp' + i);
    if (el) el.className = 'sp' + (i === n ? ' active' : i < n ? ' done' : '');
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
